name: Scrape Fuel Prices

on:
  schedule:
    # Jeden Montag 07:00 Schweizer Winterzeit (06:00 UTC)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # Manuell auslösbar

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Preise
        run: python scripts/scrape.py

      - name: Commit & Push (falls geändert)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/canton-prices.json
          git diff --cached --quiet || \
            git commit -m "chore: Treibstoffpreise $(date -u +%Y-%m-%d) [skip ci]"
          git push
