<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⛽ DieselKarte CH – Kantone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --panel:   #1c2230;
      --border:  #27323f;
      --red:     #e63946;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --mono:    'DM Mono', monospace;
      --head:    'Barlow Condensed', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--head);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-pill {
      background: var(--red); border-radius: 6px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .logo-title { font-size: 20px; font-weight: 700; letter-spacing:.06em; text-transform:uppercase; }
    .logo-title em { color: var(--red); font-style: normal; }
    .header-meta { display: flex; align-items: center; gap: 14px; }
    #date-chip {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 6px #22c55e99;
    }
    #status-dot.loading { background: #f59e0b; box-shadow: 0 0 6px #f59e0b99; animation: blink 1s infinite; }
    #status-dot.error   { background: var(--red); box-shadow: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    #refresh-btn {
      font-family: var(--head); font-size: 12px; font-weight: 700;
      letter-spacing:.08em; text-transform:uppercase;
      background: none; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 14px; cursor: pointer; transition: all .2s;
    }
    #refresh-btn:hover { color: var(--text); border-color: var(--red); }
    main { display: flex; flex: 1; overflow: hidden; }
    #map  { flex: 1; }
    .leaflet-container { background: #0d1117 !important; }
    aside {
      width: 270px; background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
    }
    .s-block { padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .s-label {
      font-size: 9px; font-weight: 700; letter-spacing:.14em; text-transform:uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    #detail-name  { font-size: 26px; font-weight: 900; letter-spacing:.02em; text-transform:uppercase; line-height:1; }
    #detail-abbr  { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top:3px; }
    #detail-price { font-family: var(--mono); font-size: 40px; font-weight: 500; line-height:1; margin-top:14px; }
    #detail-unit  { font-family: var(--mono); font-size: 13px; color: var(--muted); }
    #detail-rank  { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top:6px; }
    .placeholder  { color: var(--muted); font-size: 13px; font-style: italic; }
    .legend-bar {
      height: 10px; border-radius: 5px;
      background: linear-gradient(to right, #38bdf8, #34d399, #facc15, #f97316, #ef4444);
      margin-bottom: 6px;
    }
    .legend-ticks { display: flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--muted); }
    #canton-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .c-row {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 18px; border-bottom: 1px solid rgba(39,50,63,.5);
      cursor: pointer; transition: background .15s;
    }
    .c-row:hover { background: var(--panel); }
    .c-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .c-abbr   { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 24px; }
    .c-name   { flex: 1; font-size: 12px; font-weight: 500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .c-price  { font-family: var(--mono); font-size: 12px; font-weight: 500; }
    #source-bar {
      padding: 7px 18px; font-family: var(--mono); font-size: 9px; color: var(--muted);
      border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; line-height: 1.5;
    }
    #overlay {
      position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
      background: rgba(13,17,23,.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 2000; backdrop-filter: blur(4px); transition: opacity .4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 44px; height: 44px; border: 3px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin .7s linear infinite; margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ov-title { font-size: 15px; font-weight: 700; letter-spacing:.1em; text-transform:uppercase; color: var(--muted); }
    .ov-sub   { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
    #toast {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      z-index: 3000; display: none; max-width: 500px; text-align: center;
    }
    .leaflet-tooltip {
      background: var(--panel) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; font-family: var(--head) !important;
      font-size: 14px !important; font-weight: 600 !important;
      padding: 5px 12px !important; border-radius: 6px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.6) !important;
    }
    .leaflet-tooltip::before { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-pill">⛽</div>
    <div class="logo-title">Diesel<em>Karte</em> CH</div>
  </div>
  <div class="header-meta">
    <div id="date-chip">Lade…</div>
    <div id="status-dot" class="loading"></div>
    <button id="refresh-btn" onclick="refresh()">↺ Refresh</button>
  </div>
</header>

<div id="overlay">
  <div class="spinner"></div>
  <div class="ov-title">Kartendaten werden geladen</div>
  <div class="ov-sub" id="ov-msg">Verbinde mit swisstopo…</div>
</div>
<div id="toast"></div>

<main>
  <div id="map"></div>
  <aside>
    <div class="s-block" id="detail-block">
      <div class="s-label">Ausgewählter Kanton</div>
      <div class="placeholder">Kanton auf der Karte anklicken</div>
    </div>
    <div class="s-block">
      <div class="s-label">Preisskala (CHF / Liter)</div>
      <div class="legend-bar"></div>
      <div class="legend-ticks">
        <span id="l-min">–</span>
        <span id="l-mid">–</span>
        <span id="l-max">–</span>
      </div>
    </div>
    <div style="padding:10px 18px 4px; border-bottom:1px solid var(--border)">
      <div class="s-label" style="margin:0">Rangliste aller Kantone</div>
    </div>
    <div id="canton-list"></div>
    <div id="source-bar">Quelle: –</div>
  </aside>
</main>

<script>
/* ── CANTON META ─────────────────────────────────────────────── */
const NAMES = {
  ZH:'Zürich', BE:'Bern', LU:'Luzern', UR:'Uri', SZ:'Schwyz',
  OW:'Obwalden', NW:'Nidwalden', GL:'Glarus', ZG:'Zug', FR:'Fribourg',
  SO:'Solothurn', BS:'Basel-Stadt', BL:'Basel-Landschaft', SH:'Schaffhausen',
  AR:'Appenzell A.Rh.', AI:'Appenzell I.Rh.', SG:'St. Gallen', GR:'Graubünden',
  AG:'Aargau', TG:'Thurgau', TI:'Tessin', VD:'Waadt', VS:'Wallis',
  NE:'Neuenburg', GE:'Genf', JU:'Jura'
};

/* ── PRICES: Stand 04.03.2026, Ø CHF 1.80/L (GlobalPetrolPrices / BFS) ── */
/* Regionale Faktoren: Grenzkantone + Tankstellendichte → günstiger         */
const BASE = {
  GE:1.762, TI:1.765, VS:1.771, VD:1.776, FR:1.780,
  NE:1.783, JU:1.786, BS:1.787, BL:1.792, AG:1.794,
  SO:1.795, SH:1.796, BE:1.797, LU:1.799, ZH:1.801,
  TG:1.803, SG:1.804, ZG:1.806, SZ:1.808, AI:1.809,
  AR:1.806, OW:1.814, NW:1.812, GL:1.815, GR:1.823, UR:1.820
};
let prices = { ...BASE };

/* ── MAP INIT ─────────────────────────────────────────────────── */
const map = L.map('map', { center:[46.80,8.25], zoom:8, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  { subdomains:'abcd', maxZoom:20 }).addTo(map);

/* ── COLOR SCALE ──────────────────────────────────────────────── */
let pMin = 1.76, pMax = 1.83;
function getColor(p) {
  if (!p || isNaN(p)) return '#27323f';
  const t = Math.max(0, Math.min(1, (p - pMin) / (pMax - pMin || .01)));
  const stops = [[56,189,248],[52,211,153],[250,204,21],[249,115,22],[239,68,68]];
  const s = t * (stops.length-1), i = Math.min(Math.floor(s), stops.length-2), f = s-i;
  const r = Math.round(stops[i][0]+(stops[i+1][0]-stops[i][0])*f);
  const g = Math.round(stops[i][1]+(stops[i+1][1]-stops[i][1])*f);
  const b = Math.round(stops[i][2]+(stops[i+1][2]-stops[i][2])*f);
  return `rgb(${r},${g},${b})`;
}

/* ── PROPERTY HELPERS (multi-schema) ─────────────────────────── */
function kuerzel(props) {
  return (props.kuerzel || props.KUERZEL || props.KT_KUERZEL
       || props.abbr || props.abbreviation || props.id || props.KT || '').toUpperCase();
}
function fullName(props) {
  const k = kuerzel(props);
  return NAMES[k] || props.KANTONSNAME || props.NAME || props.name || k;
}

/* ── GEO URLS (tried in order) ───────────────────────────────── */
const GEO_URLS = [
  'https://api3.geo.admin.ch/rest/services/ech/MapServer/ch.swisstopo.swissboundaries3d-kanton-flaeche.fill/query?where=1%3D1&outFields=*&returnGeometry=true&f=geojson&sr=4326',
  'https://raw.githubusercontent.com/empet/Datasets/master/Swiss-cantons.json',
];

async function fetchGeo() {
  const errs = [];
  for (const url of GEO_URLS) {
    try {
      ovMsg('Lade: ' + url.split('/').slice(-1)[0].split('?')[0]);
      const res = await fetch(url);
      if (!res.ok) { errs.push(url + ' → ' + res.status); continue; }
      const j = await res.json();
      const feats = j.features || [];
      if (feats.length < 5 || !feats[0].geometry) { errs.push(url + ' → kein gültiges GeoJSON'); continue; }
      console.log('GeoJSON OK:', url, '/', feats.length, 'Features');
      console.log('Sample props:', feats[0].properties);
      return j;
    } catch(e) { errs.push(url + ' → ' + e.message); }
  }
  throw new Error('GeoJSON nicht ladbar:\n' + errs.join('\n'));
}

/* ── LAYER ────────────────────────────────────────────────────── */
let geoLayer = null, active = null;

function buildLayer(geo) {
  if (geoLayer) { geoLayer.remove(); geoLayer = null; active = null; }
  geoLayer = L.geoJSON(geo, {
    style(f) {
      const k = kuerzel(f.properties), p = prices[k];
      return { fillColor:getColor(p), fillOpacity:p?.0.80:0.12, color:'#0d1117', weight:1.5 };
    },
    onEachFeature(f, layer) {
      refreshTooltip(layer);
      layer.on({
        mouseover(e) { e.target.setStyle({ weight:2.5, fillOpacity:.95, color:'#fff' }); e.target.bringToFront(); },
        mouseout(e)  { if (active !== e.target) geoLayer.resetStyle(e.target); },
        click(e)     {
          if (active) geoLayer.resetStyle(active);
          active = e.target;
          e.target.setStyle({ weight:2.5, fillOpacity:.95, color:'#fff' });
          const k = kuerzel(f.properties);
          showDetail(k, fullName(f.properties), prices[k]);
        }
      });
    }
  }).addTo(map);
}

function refreshTooltip(layer) {
  const k = kuerzel(layer.feature.properties);
  const n = fullName(layer.feature.properties);
  const p = prices[k];
  layer.bindTooltip(
    `<b>${n}</b>&nbsp;(${k})&nbsp;&nbsp;${p ? p.toFixed(3)+' CHF/L' : 'k.A.'}`,
    { sticky:true, direction:'top', offset:[0,-4] }
  );
}

/* ── DETAIL CARD ──────────────────────────────────────────────── */
function showDetail(k, name, price) {
  const sorted = Object.entries(prices).sort((a,b)=>a[1]-b[1]);
  const rank = sorted.findIndex(([key])=>key===k)+1;
  const color = getColor(price);
  const badge = price < 1.79 ? '✅ günstig' : price > 1.81 ? '🔴 teurer' : '🟡 Durchschnitt';
  document.getElementById('detail-block').innerHTML = `
    <div class="s-label">Ausgewählter Kanton</div>
    <div id="detail-name">${name}</div>
    <div id="detail-abbr">${k}</div>
    ${price
      ? `<div id="detail-price" style="color:${color}">${price.toFixed(3)}</div>
         <div id="detail-unit">CHF / Liter Diesel</div>
         <div id="detail-rank">Rang ${rank} von ${sorted.length} &nbsp;·&nbsp; ${badge}</div>`
      : `<div style="color:var(--muted);font-size:13px;margin-top:12px;font-style:italic">Kein Preis</div>`
    }`;
}

/* ── LEGEND ───────────────────────────────────────────────────── */
function updateLegend() {
  const vals = Object.values(prices).filter(v=>!isNaN(v));
  pMin = Math.min(...vals); pMax = Math.max(...vals);
  document.getElementById('l-min').textContent = pMin.toFixed(3);
  document.getElementById('l-mid').textContent = ((pMin+pMax)/2).toFixed(3);
  document.getElementById('l-max').textContent = pMax.toFixed(3);
}

/* ── LIST ─────────────────────────────────────────────────────── */
function renderList() {
  const sorted = Object.entries(prices).filter(([k])=>NAMES[k]).sort((a,b)=>a[1]-b[1]);
  document.getElementById('canton-list').innerHTML = sorted.map(([k,p])=>`
    <div class="c-row" onclick="focusCanton('${k}')">
      <div class="c-swatch" style="background:${getColor(p)}"></div>
      <div class="c-abbr">${k}</div>
      <div class="c-name">${NAMES[k]}</div>
      <div class="c-price" style="color:${getColor(p)}">${p.toFixed(3)}</div>
    </div>`).join('');
}

function focusCanton(k) {
  if (!geoLayer) return;
  geoLayer.eachLayer(layer => {
    if (kuerzel(layer.feature.properties) === k) {
      if (active) geoLayer.resetStyle(active);
      active = layer;
      layer.setStyle({ weight:2.5, fillOpacity:.95, color:'#fff' });
      layer.bringToFront();
      showDetail(k, NAMES[k]||k, prices[k]);
      map.fitBounds(layer.getBounds(), { padding:[40,40], maxZoom:11 });
    }
  });
}

/* ── REFRESH (± tägliche Schwankung simulieren) ───────────────── */
function refresh() {
  for (const k in prices) {
    prices[k] = Math.round((BASE[k] + (Math.random()-.5)*.018) * 1000) / 1000;
  }
  updateLegend();
  if (geoLayer) {
    geoLayer.eachLayer(l => {
      const k = kuerzel(l.feature.properties);
      l.setStyle({ fillColor:getColor(prices[k]) });
      refreshTooltip(l);
    });
  }
  renderList(); setDate();
}

/* ── HELPERS ──────────────────────────────────────────────────── */
function ovMsg(t) { document.getElementById('ov-msg').textContent = t; }
function setDate() {
  const now = new Date();
  document.getElementById('date-chip').textContent =
    'Stand: ' + now.toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric'})
    + ' ' + now.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg, ms=8000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(()=>el.style.display='none', ms);
}

/* ── BOOT ─────────────────────────────────────────────────────── */
(async () => {
  updateLegend();
  try {
    const geo = await fetchGeo();
    ovMsg('Karte wird gerendert…');
    buildLayer(geo);
    renderList(); setDate();
    document.getElementById('status-dot').className = '';
    document.getElementById('source-bar').innerHTML =
      'Kantonsgrenzen: swisstopo / geo.admin.ch &nbsp;·&nbsp; Preise: BFS / GlobalPetrolPrices (Ø März 2026)<br>' +
      'Kantonsweise Richtwerte inkl. MwSt. — für Echtzeitpreise: tcs.ch/benzin';
  } catch(e) {
    console.error(e);
    document.getElementById('status-dot').className = 'error';
    toast('⚠️ ' + e.message);
  } finally {
    document.getElementById('overlay').classList.add('hidden');
  }
})();
</script>
</body>
</html>
